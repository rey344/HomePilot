# HomePilot – local dev / demo: backend, frontend, Postgres
# Run from repo root: docker compose -f infrastructure/docker-compose.yml up --build -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homepilot
      POSTGRES_PASSWORD: homepilot
      POSTGRES_DB: homepilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homepilot -d homepilot"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://homepilot:homepilot@postgres:5432/homepilot
    ports:
      - "9001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:9001
    ports:
      - "9002:3000"
    depends_on:
      - backend
